<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FluxDesk | Dashboard</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/dashboard.css" />
  </head>
  <body>
    <header class="topbar">
      <div
        class="container d-flex flex-wrap justify-content-between align-items-center gap-3"
      >
        <div>
          <span class="brand-mark">FluxDesk</span>
          <h1 class="page-title">Dashboard Kanban</h1>
          <p class="page-subtitle">
            Visualização e movimentação das solicitações
          </p>
        </div>

        <div class="d-flex gap-2 flex-wrap">
          <a href="create.html" class="btn btn-light text-primary fw-semibold">Formulário Externo</a>
          <a href="metrics.html" class="btn btn-light text-primary fw-semibold">Ver Métricas</a>
        </div>
      </div>
    </header>

    <main class="container my-4">
      <div class="row mb-4">
        <div class="col-12">
          <div class="card border-0 shadow-sm">
            <div class="card-body p-3">
              <div class="row g-3">
                <div class="col-md-3">
                  <div class="metric-box">
                    <span class="metric-label">Total</span>
                    <strong id="metricTotal">0</strong>
                  </div>
                </div>
                <div class="col-md-3">
                  <div class="metric-box">
                    <span class="metric-label">Críticas</span>
                    <strong id="metricCriticas">0</strong>
                  </div>
                </div>
                <div class="col-md-3">
                  <div class="metric-box">
                    <span class="metric-label">Impedem funcionamento</span>
                    <strong id="metricBloqueantes">0</strong>
                  </div>
                </div>
                <div class="col-md-3">
                  <div class="metric-box">
                    <span class="metric-label">Concluídas</span>
                    <strong id="metricConcluidas">0</strong>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <section class="kanban-board">
        <div class="kanban-column">
          <div class="kanban-header recebido-header">
            <h2>Recebido</h2>
            <span id="countRecebido" class="badge-count">0</span>
          </div>
          <div class="kanban-cards" id="recebido"></div>
        </div>

        <div class="kanban-column">
          <div class="kanban-header analise-header">
            <h2>Em análise</h2>
            <span id="countAnalise" class="badge-count">0</span>
          </div>
          <div class="kanban-cards" id="em-analise"></div>
        </div>

        <div class="kanban-column">
          <div class="kanban-header revisao-header">
            <h2>Em revisão</h2>
            <span id="countRevisao" class="badge-count">0</span>
          </div>
          <div class="kanban-cards" id="em-revisao"></div>
        </div>

        <div class="kanban-column">
          <div class="kanban-header concluido-header">
            <h2>Concluído</h2>
            <span id="countConcluido" class="badge-count">0</span>
          </div>
          <div class="kanban-cards" id="concluido"></div>
        </div>
      </section>
    </main>

    <footer class="site-footer mt-5">
      <div class="container d-flex flex-wrap justify-content-between align-items-center py-3">
        <span class="footer-brand">FluxDesk</span>
      </div>
    </footer>

    <!-- Modal de Edição -->
    <div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="editModalLabel">Editar Chamado</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form id="editForm">
              <input type="hidden" id="editId">
              <div class="mb-3">
                <label for="editTitulo" class="form-label">Título</label>
                <input
                  type="text"
                  class="form-control"
                  id="editTitulo"
                  placeholder="Ex.: Sistema fora do ar"
                  required
                />
              </div>

              <div class="row">
                <div class="col-md-6 mb-3">
                  <label for="editPessoasAfetadas" class="form-label">
                    Quantidade de pessoas afetadas
                  </label>
                  <input
                    type="number"
                    class="form-control"
                    id="editPessoasAfetadas"
                    min="0"
                    placeholder="Ex.: 20"
                    required
                  />
                </div>

                <div class="col-md-6 mb-3">
                  <label for="editTime" class="form-label">
                    Time de origem
                  </label>
                  <select class="form-select" id="editTime" required>
                    <option value="">Selecione</option>
                    <option value="Financeiro">Financeiro</option>
                    <option value="TI">TI</option>
                    <option value="Desenvolvimento">Desenvolvimento</option>
                    <option value="Suporte">Suporte</option>
                    <option value="Infraestrutura">Infraestrutura</option>
                    <option value="RH">RH</option>
                  </select>
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label d-block">
                  Impacto (impede funcionamento)?
                </label>

                <div class="form-check form-check-inline">
                  <input
                    class="form-check-input"
                    type="radio"
                    name="editImpacto"
                    id="editImpactoSim"
                    value="true"
                    required
                  />
                  <label class="form-check-label" for="editImpactoSim">Sim</label>
                </div>

                <div class="form-check form-check-inline">
                  <input
                    class="form-check-input"
                    type="radio"
                    name="editImpacto"
                    id="editImpactoNao"
                    value="false"
                    required
                  />
                  <label class="form-check-label" for="editImpactoNao">Não</label>
                </div>
              </div>

              <div class="mb-3">
                <label for="editStatus" class="form-label">Status</label>
                <select class="form-select" id="editStatus" required>
                  <option value="Recebido">Recebido</option>
                  <option value="Em análise">Em análise</option>
                  <option value="Em revisão">Em revisão</option>
                  <option value="Concluído">Concluído</option>
                </select>
              </div>
            </form>
            <div id="editMessage" class="mt-3"></div>
          </div>
          <div class="modal-footer">
            <button type="button" id="editDeleteBtn" class="btn btn-danger me-auto">Excluir Chamado</button>
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" form="editForm" class="btn btn-primary">Salvar Alterações</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/dashboard.js"></script>
  </body>
</html>
