<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FluxDesk | Métricas</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/dashboard.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <header class="topbar">
      <div
        class="container d-flex flex-wrap justify-content-between align-items-center gap-3"
      >
        <div>
          <span class="brand-mark">FluxDesk</span>
          <h1 class="page-title">Métricas de Solicitações</h1>
          <p class="page-subtitle">
            Visualização detalhada das métricas e gráficos
          </p>
        </div>

        <div class="d-flex gap-2 flex-wrap">
          <a href="dashboard.html" class="btn btn-light">Voltar ao Dashboard</a>
        </div>
      </div>
    </header>

    <main class="container my-4">
      <div class="row mb-4">
        <div class="col-12">
          <div class="card border-0 shadow-sm">
            <div class="card-body p-3">
              <div class="row g-3">
                <div class="col-md-3">
                  <div class="metric-box">
                    <span class="metric-label">Total</span>
                    <strong id="metricTotal">0</strong>
                  </div>
                </div>
                <div class="col-md-3">
                  <div class="metric-box">
                    <span class="metric-label">Críticas</span>
                    <strong id="metricCriticas">0</strong>
                  </div>
                </div>
                <div class="col-md-3">
                  <div class="metric-box">
                    <span class="metric-label">Impedem funcionamento</span>
                    <strong id="metricBloqueantes">0</strong>
                  </div>
                </div>
                <div class="col-md-3">
                  <div class="metric-box">
                    <span class="metric-label">Concluídas</span>
                    <strong id="metricConcluidas">0</strong>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-md-6">
          <div class="card border-0 shadow-sm">
            <div class="card-header">
              <h5>Distribuição por Status</h5>
            </div>
            <div class="card-body">
              <canvas id="statusChart"></canvas>
            </div>
          </div>
        </div>
        <div class="col-md-6">
          <div class="card border-0 shadow-sm">
            <div class="card-header">
              <h5>Distribuição por Time</h5>
            </div>
            <div class="card-body">
              <canvas id="timeChart"></canvas>
            </div>
          </div>
        </div>
      </div>

      <div class="row mt-4">
        <div class="col-12">
          <div class="card border-0 shadow-sm">
            <div class="card-header">
              <h5>Lista de Chamados</h5>
            </div>
            <div class="card-body">
              <table class="table table-striped">
                <thead>
                  <tr>
                    <th>Título</th>
                    <th>Status</th>
                    <th>Time</th>
                    <th>Pessoas Afetadas</th>
                    <th>Crítico</th>
                  </tr>
                </thead>
                <tbody id="requestsTable">
                  <!-- Dados serão inseridos aqui -->
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="site-footer mt-5">
      <div class="container d-flex flex-wrap justify-content-between align-items-center py-3">
        <span class="footer-brand">FluxDesk</span>
        <span class="footer-meta">v1.0 • Feito com ❤️</span>
      </div>
    </footer>

    <script src="../assets/js/metrics.js"></script>
  </body>
</html>
